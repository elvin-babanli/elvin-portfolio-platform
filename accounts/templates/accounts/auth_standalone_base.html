{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Auth{% endblock %} — Elvin's CodeBase</title>
  <link rel="icon" type="image/png" href="{% static 'img/babanli_labs_logo.png' %}">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;0,9..40,800&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; padding: 0; font-family: 'DM Sans', system-ui, sans-serif; min-height: 100vh; overflow-x: hidden; }
    .auth-standalone {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      position: relative;
    }
    .auth-top-bar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 100;
      padding: 20px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: transparent;
      transition: background 0.3s ease;
    }
    .auth-top-bar.scrolled { background: rgba(255,255,255,.85); backdrop-filter: blur(12px); }
    .auth-logo {
      font-weight: 800;
      font-size: 1.2rem;
      letter-spacing: -0.02em;
      color: #0f172a;
      text-decoration: none;
      transition: opacity 0.2s;
    }
    .auth-logo:hover { opacity: 0.8; }
    .auth-logo span { color: #2563eb; }
    .auth-back-link {
      font-size: 0.9rem;
      font-weight: 600;
      color: #64748b;
      text-decoration: none;
      padding: 8px 16px;
      border-radius: 10px;
      transition: all 0.2s;
    }
    .auth-back-link:hover { color: #0f172a; background: rgba(0,0,0,.05); }
    .auth-main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 100px 24px 60px;
    }
    .auth-bg {
      position: fixed;
      inset: 0;
      z-index: 0;
      background: linear-gradient(165deg, #f0f4ff 0%, #e8f0fe 35%, #faf5ff 70%, #f8fafc 100%);
    }
    .auth-bg::before {
      content: '';
      position: absolute;
      top: -20%;
      right: -10%;
      width: 60vmax;
      height: 60vmax;
      background: radial-gradient(circle, rgba(99, 102, 241, 0.08) 0%, transparent 70%);
      animation: authFloat 20s ease-in-out infinite;
    }
    .auth-bg::after {
      content: '';
      position: absolute;
      bottom: -15%;
      left: -5%;
      width: 50vmax;
      height: 50vmax;
      background: radial-gradient(circle, rgba(37, 99, 235, 0.06) 0%, transparent 70%);
      animation: authFloat 18s ease-in-out infinite reverse;
    }
    @keyframes authFloat {
      0%, 100% { transform: translate(0,0) scale(1); }
      50% { transform: translate(2%, 2%) scale(1.02); }
    }
    .auth-card {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 440px;
      background: rgba(255,255,255,0.92);
      backdrop-filter: blur(24px);
      border-radius: 24px;
      box-shadow: 0 32px 64px -12px rgba(0,0,0,.12), 0 0 0 1px rgba(0,0,0,.04);
      padding: 48px 40px;
      animation: authCardEnter 0.7s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
    }
    @keyframes authCardEnter {
      from { opacity: 0; transform: translateY(32px) scale(0.98); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }
    .auth-card h1 {
      font-size: 1.75rem;
      font-weight: 800;
      color: #0f172a;
      margin: 0 0 8px;
      letter-spacing: -0.03em;
    }
    .auth-subtitle {
      font-size: 0.95rem;
      color: #64748b;
      margin: 0 0 28px;
      line-height: 1.5;
    }
    .auth-input-wrap {
      position: relative;
      margin-bottom: 16px;
      animation: authInputReveal 0.5s ease backwards;
    }
    .auth-input-wrap:nth-of-type(1){ animation-delay: 0.08s; }
    .auth-input-wrap:nth-of-type(2){ animation-delay: 0.12s; }
    .auth-input-wrap:nth-of-type(3){ animation-delay: 0.16s; }
    .auth-input-wrap:nth-of-type(4){ animation-delay: 0.2s; }
    .auth-input-wrap:nth-of-type(5){ animation-delay: 0.24s; }
    .auth-input-wrap:nth-of-type(6){ animation-delay: 0.28s; }
    @keyframes authInputReveal {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .auth-input {
      width: 100%;
      padding: 14px 16px 14px 48px;
      border: 1px solid #e2e8f0;
      border-radius: 14px;
      font-size: 0.95rem;
      color: #0f172a;
      background: #fff;
      transition: all 0.25s cubic-bezier(0.4,0,0.2,1);
    }
    .auth-input:focus {
      outline: none;
      border-color: #2563eb;
      box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.12);
    }
    .auth-input::placeholder { color: #94a3b8; }
    .auth-input-wrap.has-error .auth-input {
      border-color: #ef4444;
      box-shadow: 0 0 0 4px rgba(239, 68, 68, 0.1);
    }
    .auth-input-wrap .auth-icon {
      position: absolute;
      left: 16px;
      top: 50%;
      transform: translateY(-50%);
      color: #94a3b8;
      font-size: 1.1rem;
      pointer-events: none;
      transition: color 0.25s;
    }
    .auth-input-wrap:focus-within .auth-icon,
    .auth-input:focus ~ .auth-icon { color: #2563eb; }
    .auth-input-wrap.has-error .auth-icon { color: #ef4444; }
    .auth-forgot {
      display: block;
      margin: -8px 0 20px;
      font-size: 0.9rem;
      font-weight: 500;
      color: #2563eb;
      text-decoration: none;
      transition: color 0.2s;
    }
    .auth-forgot:hover { color: #1d4ed8; }
    .auth-divider {
      display: flex;
      align-items: center;
      gap: 16px;
      margin: 24px 0;
    }
    .auth-divider::before, .auth-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: #e2e8f0;
    }
    .auth-divider span { font-size: 0.8rem; color: #94a3b8; font-weight: 500; }
    .auth-social-row { display: flex; flex-direction: column; gap: 10px; }
    .auth-social-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 12px 20px;
      border: 1px solid #e2e8f0;
      border-radius: 12px;
      background: #fff;
      color: #374151;
      font-size: 0.9rem;
      font-weight: 600;
      text-decoration: none;
      transition: all 0.25s;
    }
    .auth-social-btn:hover {
      border-color: #2563eb;
      background: rgba(37, 99, 235, 0.04);
      color: #1d4ed8;
      transform: translateY(-1px);
    }
    .auth-btn {
      width: 100%;
      padding: 14px 20px;
      border: none;
      border-radius: 14px;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.25s cubic-bezier(0.4,0,0.2,1);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .auth-btn-primary {
      background: linear-gradient(135deg, #2563eb, #3b82f6);
      color: #fff;
      box-shadow: 0 4px 16px rgba(37, 99, 235, 0.35);
    }
    .auth-btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(37, 99, 235, 0.4);
    }
    .auth-btn-primary:disabled { opacity: 0.7; cursor: not-allowed; transform: none; }
    .auth-btn-ghost {
      background: transparent;
      color: #64748b;
      font-weight: 600;
    }
    .auth-btn-ghost:hover { color: #0f172a; background: rgba(0,0,0,.04); }
    .auth-spinner {
      width: 20px;
      height: 20px;
      border: 2px solid rgba(255,255,255,.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: authSpin 0.8s linear infinite;
    }
    @keyframes authSpin { to { transform: rotate(360deg); } }
    .auth-link-wrap {
      text-align: center;
      margin-top: 24px;
      font-size: 0.95rem;
      color: #64748b;
    }
    .auth-link-wrap a {
      color: #2563eb;
      font-weight: 700;
      text-decoration: none;
      transition: color 0.2s;
    }
    .auth-link-wrap a:hover { color: #1d4ed8; }
    .auth-toggle-password {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: #94a3b8;
      cursor: pointer;
      padding: 4px;
      font-size: 1.1rem;
      transition: color 0.2s;
    }
    .auth-toggle-password:hover { color: #64748b; }
    .auth-password-wrap .auth-input { padding-right: 48px; }
    .auth-err { font-size: 0.8rem; color: #ef4444; margin-top: 6px; }

    .auth-code-input {
      text-align: center;
      font-size: 1.25rem;
      font-weight: 700;
      letter-spacing: 0.25em;
    }

    /* Toast */
    #toastContainer {
      position: fixed;
      bottom: 24px;
      left: 24px;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      gap: 10px;
      max-width: min(380px, calc(100vw - 48px));
      pointer-events: none;
    }
    #toastContainer .toast-item {
      pointer-events: auto;
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 14px 16px;
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 10px 40px rgba(0,0,0,.12), 0 0 0 1px rgba(0,0,0,.04);
      animation: toastSlideIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
    }
    #toastContainer .toast-item.toast-exit { animation: toastSlideOut 0.3s ease forwards; }
    @keyframes toastSlideIn {
      from { opacity: 0; transform: translateX(-24px); }
      to { opacity: 1; transform: translateX(0); }
    }
    @keyframes toastSlideOut {
      from { opacity: 1; transform: translateX(0); }
      to { opacity: 0; transform: translateX(-24px); }
    }
    #toastContainer .toast-icon {
      width: 24px; height: 24px; border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; font-size: 14px;
    }
    #toastContainer .toast-success .toast-icon { background: rgba(16,185,129,.15); color: #059669; }
    #toastContainer .toast-error .toast-icon { background: rgba(239,68,68,.15); color: #dc2626; }
    #toastContainer .toast-info .toast-icon { background: rgba(37,99,235,.15); color: #2563eb; }
    #toastContainer .toast-warning .toast-icon { background: rgba(245,158,11,.15); color: #d97706; }
    #toastContainer .toast-body { flex: 1; font-size: 0.9rem; color: #374151; line-height: 1.4; }
    #toastContainer .toast-close { background: none; border: none; color: #9ca3af; cursor: pointer; padding: 2px; font-size: 1.1rem; }
    #toastContainer .toast-close:hover { color: #6b7280; }
    @media (max-width: 480px) {
      #toastContainer { bottom: 16px; left: 16px; max-width: calc(100vw - 32px); }
      .auth-card { padding: 36px 24px; }
    }
  </style>
  {% block extra_head %}{% endblock %}
</head>
<body>
  <div class="auth-standalone">
    <div class="auth-bg"></div>
    <header class="auth-top-bar" id="authTopBar">
      <a href="/" class="auth-logo"><span>Elvin's</span> CodeBase</a>
      <a href="{% block auth_back_url %}{% url 'accounts:auth_login' %}{% endblock %}" class="auth-back-link">← Back</a>
    </header>
    <main class="auth-main">
      <div class="auth-card">
        {% block auth_content %}{% endblock %}
      </div>
    </main>
  </div>

  <div id="toastContainer" aria-live="polite"></div>
  {% if messages %}
  <script type="application/json" id="djangoMessages">
  [{% for m in messages %}{"msg":"{{ m|escapejs }}","tag":"{{ m.tags|default:'info' }}"}{% if not forloop.last %},{% endif %}{% endfor %}]
  </script>
  {% endif %}

  <script>
  (function(){
    var icons = { success:'✓', error:'✕', info:'ℹ', warning:'!' };
    function showToast(msg, tag) {
      tag = tag || 'info';
      var c = document.getElementById('toastContainer');
      if (!c) return;
      var el = document.createElement('div');
      el.className = 'toast-item toast-' + tag;
      el.innerHTML = '<span class="toast-icon">' + (icons[tag]||icons.info) + '</span>' +
        '<span class="toast-body">' + (msg||'').replace(/</g,'&lt;') + '</span>' +
        '<button type="button" class="toast-close" aria-label="Close">×</button>';
      var close = function(){ el.classList.add('toast-exit'); setTimeout(function(){ el.remove(); }, 300); };
      el.querySelector('.toast-close').onclick = close;
      c.appendChild(el);
      setTimeout(close, 4500);
    }
    window.showToast = showToast;
    var dm = document.getElementById('djangoMessages');
    if (dm) {
      try {
        var arr = JSON.parse(dm.textContent);
        arr.forEach(function(m){ showToast(m.msg, m.tag); });
      } catch(e){}
    }
    document.querySelectorAll('.auth-toggle-password').forEach(function(btn) {
      btn.addEventListener('click', function() {
        var wrap = this.closest('.auth-password-wrap') || this.closest('.auth-input-wrap');
        var input = wrap && wrap.querySelector('input[type="password"], input[type="text"]');
        if (!input) return;
        var isPw = input.type === 'password';
        input.type = isPw ? 'text' : 'password';
        btn.textContent = isPw ? '🙈' : '👁';
      });
    });
    document.querySelectorAll('form[id^="auth"]').forEach(function(form) {
      form.addEventListener('submit', function() {
        var btn = form.querySelector('#authSubmitBtn');
        if (btn && !btn.disabled) {
          btn.disabled = true;
          var txt = btn.querySelector('.auth-btn-text');
          if (txt) txt.innerHTML = '<span class="auth-spinner"></span> ' + (btn.getAttribute('data-loading-text') || 'Please wait...');
        }
      });
    });
    window.addEventListener('scroll', function() {
      document.getElementById('authTopBar').classList.toggle('scrolled', window.scrollY > 20);
    });
  })();
  </script>
  {% block auth_scripts %}{% endblock %}
</body>
</html>
