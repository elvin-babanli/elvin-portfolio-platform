<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Server Error — Elvin's CodeBase</title>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f8fafc; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }
    .err-box { max-width: 480px; text-align: center; }
    .err-code { font-size: 4rem; font-weight: 800; color: #2563eb; margin: 0; letter-spacing: -0.02em; }
    .err-title { font-size: 1.25rem; color: #0f172a; margin: 16px 0 8px; }
    .err-msg { color: #64748b; font-size: 0.95rem; line-height: 1.6; margin-bottom: 24px; }
    .err-link { display: inline-block; padding: 12px 24px; background: linear-gradient(135deg, #2563eb, #3b82f6); color: #fff; text-decoration: none; border-radius: 12px; font-weight: 600; }
    .err-link:hover { opacity: 0.95; }
  </style>
</head>
<body>
  <div class="err-box">
    <p class="err-code">500</p>
    <h1 class="err-title">Something went wrong</h1>
    <p class="err-msg">We're sorry, but something went wrong on our end. Please try again in a moment.</p>
    <a href="/" class="err-link">Return to home</a>
  </div>
</body>
</html>
