# Render Blueprint - Django app
# https://render.com/docs/blueprint-spec
services:
  - type: web
    name: django-codebase
    env: python
    region: oregon

    buildCommand: "pip install -r requirements.txt && python manage.py migrate --noinput && python create_admin_user.py && python manage.py collectstatic --noinput"
    startCommand: "bash start.sh"

    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        sync: false  # Set in dashboard: your-app.onrender.com
      - key: DATABASE_URL
        fromDatabase:
          name: django-codebase-db
          property: connectionString
      - key: CSRF_TRUSTED_ORIGINS
        sync: false  # Set: https://your-app.onrender.com

databases:
  - name: django-codebase-db
    plan: free
    databaseName: django_codebase
    user: django
